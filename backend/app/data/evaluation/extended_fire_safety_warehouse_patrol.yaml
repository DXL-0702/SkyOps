evaluation_case:
  case_id: eval-extended-fire-safety-warehouse-patrol
  title: Extended fire safety warehouse patrol evaluation case
  scenario_type: fire_safety_patrol
  raw_user_input: Plan a fire-safety patrol around the warehouse zone while keeping a safe distance from hazardous areas.
  environment_state:
    source_type: mock
    weather_summary: Mock warm afternoon with light wind and possible smoke-prone warehouse operations.
    wind_speed_mps: 4.4
    visibility_level: fair
    crowd_level: low
    gps_quality: stable around warehouse perimeter
    gps_confidence: 0.86
    data_confidence: 0.84
  airspace_constraint:
    source_type: mock
    is_flyable: true
    approval_required: false
    restricted_zones:
      - mock chemical storage standoff zone
      - mock loading dock vehicle buffer
    altitude_limit_m: 75
    compliance_risk_level: medium
    explanation: >
      Mock airspace supports perimeter patrol, but chemical storage and loading
      dock buffers require conservative standoff.
  drone_state:
    source_type: mock
    drone_id: mock-drone-extended-fire-warehouse-01
    model: DJI Matrice class mock platform
    battery_percent: 86
    estimated_endurance_minutes: 28
    return_to_home_battery_threshold: 30
    payloads:
      - wide camera
      - speaker
    link_quality: low
    video_latency_ms: 170
    available_for_mission: true
  incident_events: []
  expected_hard_constraints:
    - id: hard-hazard-standoff
      description: Route must maintain safe standoff from chemical storage.
      must_pass: true
      rule_ref: restricted_zones
      severity: high
    - id: hard-no-close-hazard-approach
      description: Mission must not require close approach to hazardous warehouse areas.
      must_pass: true
      rule_ref: minimum_safety_distance
      severity: high
    - id: hard-altitude-ceiling
      description: Patrol must stay below the 75 m altitude limit.
      must_pass: true
      rule_ref: altitude_limit_m
      severity: high
    - id: hard-rth-reserve
      description: Battery reserve must be preserved for safe return.
      must_pass: true
      rule_ref: min_battery_percent
      severity: high
  expected_risks:
    - id: smoke_visibility_risk
      category: visibility
      trigger_condition: visibility_level == fair and warehouse is smoke-prone
      minimum_risk_level: medium
      must_recall: true
    - id: hazardous_zone_standoff_risk
      category: public_safety
      trigger_condition: restricted_zones include chemical storage standoff zone
      minimum_risk_level: high
      must_recall: true
    - id: vehicle_buffer_risk
      category: operations
      trigger_condition: restricted_zones include loading dock vehicle buffer
      minimum_risk_level: medium
      must_recall: true
  expected_response_behaviors:
    - id: response-fire-patrol-standoff
      incident_type: fire_safety_patrol
      expected_actions:
        - keep safe standoff distance
        - avoid hazardous buffer zones
        - reduce route aggressiveness under smoke risk
        - require human review if visibility degrades
      forbidden_actions:
        - approach hazardous storage closely
        - continue through smoke without review
      human_confirmation_required: true
      makeup_flight_expected: false
  baseline_plan:
    expected_duration_minutes: 18
    expected_coverage_percent: 78
    task_split_count: 1
    manual_intervention_count: 1
    safety_margin_notes:
      - route outside chemical storage standoff zone
      - loading dock buffer remains excluded
      - visibility degradation requires review
  tags:
    - extended_coverage
    - fire_safety_patrol
    - warehouse
  source_type: mock
baseline_mission_plan:
  mission_id: mission-extended-fire-safety-warehouse-patrol
  recommended_time_window: 14:00-14:30 simulated local time
  launch_landing_points:
    - id: llp-warehouse-fire-lane
      name: Warehouse fire lane pad
      description: Mock launch point outside loading dock vehicle buffer.
      safety_notes:
        - preserve fire lane access
        - maintain chemical storage standoff
  route_strategy: Perimeter patrol with wide standoff around chemical storage and loading dock buffers.
  flight_segments:
    - north warehouse perimeter
    - east warehouse perimeter
  safety_thresholds:
    max_wind_speed_mps: 8.0
    min_battery_percent: 35
    min_gps_confidence: 0.65
    max_video_latency_ms: 500
  abort_conditions:
    - visibility_level == poor
    - route enters restricted_zones
    - battery_percent <= 35
  contingency_plan:
    - pause patrol
    - return to fire lane pad
    - request human review if smoke reduces visibility
  expected_coverage_percent: 78
  estimated_duration_minutes: 18
  explanation: >
    Mock extended case evaluates fire-safety patrol routing around hazardous
    zones with conservative operational standoff.
