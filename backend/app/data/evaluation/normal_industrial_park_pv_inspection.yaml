evaluation_case:
  case_id: eval-normal-industrial-park-pv
  title: Normal industrial park photovoltaic inspection planning evaluation case
  scenario_type: industrial_park_photovoltaic_inspection
  raw_user_input: Plan a low-altitude inspection route for the photovoltaic panels in the industrial park.
  environment_state:
    source_type: simulated
    weather_summary: Simulated bright late morning with light wind and strong panel reflection.
    wind_speed_mps: 3.1
    visibility_level: good
    crowd_level: low
    gps_quality: stable across the open industrial park roof and service lanes
    gps_confidence: 0.9
    data_confidence: 0.88
  airspace_constraint:
    source_type: simulated
    is_flyable: true
    approval_required: false
    restricted_zones:
      - mock inverter maintenance zone
      - mock transformer yard buffer
    altitude_limit_m: 70
    compliance_risk_level: low
    explanation: >
      Simulated airspace permits low-altitude PV coverage inside the industrial
      park boundary while avoiding maintenance and transformer buffers.
  drone_state:
    source_type: simulated
    drone_id: simulated-drone-normal-pv-01
    model: DJI Mavic enterprise class simulated platform
    battery_percent: 91
    estimated_endurance_minutes: 33
    return_to_home_battery_threshold: 30
    payloads:
      - wide camera
      - thermal camera
    link_quality: low
    video_latency_ms: 150
    available_for_mission: true
  incident_events: []
  expected_hard_constraints:
    - id: hard-park-boundary
      description: Keep the route inside the simulated industrial park boundary.
      must_pass: true
      rule_ref: mission_boundary
      severity: high
    - id: hard-panel-standoff
      description: Maintain safe vertical and lateral distance from panel rows.
      must_pass: true
      rule_ref: minimum_safety_distance
      severity: high
    - id: hard-maintenance-zone-avoidance
      description: Avoid inverter maintenance and transformer yard buffers.
      must_pass: true
      rule_ref: restricted_zones
      severity: high
    - id: hard-return-battery-reserve
      description: Preserve minimum return battery for the park route.
      must_pass: true
      rule_ref: min_battery_percent
      severity: high
    - id: hard-altitude-ceiling
      description: Keep all segments at or below the 70 m altitude ceiling.
      must_pass: true
      rule_ref: altitude_limit_m
      severity: high
  expected_risks:
    - id: risk-panel-glare
      category: visibility
      trigger_condition: weather_summary contains strong panel reflection
      minimum_risk_level: low
      must_recall: true
    - id: risk-repetitive-panel-layout
      category: navigation
      trigger_condition: route crosses repetitive PV row layout
      minimum_risk_level: medium
      must_recall: true
    - id: risk-maintenance-workers
      category: public_safety
      trigger_condition: restricted_zones include maintenance work areas
      minimum_risk_level: medium
      must_recall: true
  expected_response_behaviors: []
  baseline_plan:
    expected_duration_minutes: 22
    expected_coverage_percent: 88
    task_split_count: 2
    manual_intervention_count: 0
    safety_margin_notes:
      - keep route within park boundary
      - avoid maintenance buffers
      - account for reflective panel rows
  tags:
    - normal
    - low_risk
    - photovoltaic_inspection
    - industrial_park
  source_type: simulated
baseline_mission_plan:
  mission_id: mission-normal-industrial-park-pv
  recommended_time_window: 10:30-11:10 simulated local time
  launch_landing_points:
    - id: llp-pv-service-lane
      name: PV service lane launch point
      description: Simulated launch point beside the maintenance access lane.
      safety_notes:
        - confirm maintenance buffer is clear
        - keep takeoff away from panel edges
  route_strategy: Two-lane lawnmower coverage path over PV rows with restricted-zone avoidance.
  flight_segments:
    - north PV row coverage
    - south PV row coverage
  safety_thresholds:
    max_wind_speed_mps: 8.0
    min_battery_percent: 35
    min_gps_confidence: 0.65
    max_video_latency_ms: 500
  abort_conditions:
    - wind_speed_mps >= 8.0
    - battery_percent <= 35
    - gps_confidence < 0.65
    - route enters restricted_zones
  contingency_plan:
    - pause over safe service lane
    - return to launch point
    - mark skipped PV rows for later coverage
  expected_coverage_percent: 88
  estimated_duration_minutes: 22
  explanation: >
    Simulated baseline case focuses on safe PV coverage planning and risk
    reasoning for normal industrial park operations.
